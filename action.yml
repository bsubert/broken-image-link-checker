name: 'Website Image Crawler'
description: 'Crawl a sitemap and report broken or missing images'
author: 'your-name'

inputs:
  sitemap-url:
    description: 'Full URL of the sitemap.xml to crawl'
    required: true
  concurrency:
    description: 'Number of pages to crawl in parallel'
    required: false
    default: '5'
  page-timeout-ms:
    description: 'Per-page navigation timeout in milliseconds'
    required: false
    default: '30000'
  report-path:
    description: 'Path to write the JSON report'
    required: false
    default: 'broken-images-report.json'
  fail-on-issues:
    description: 'Exit with non-zero status if any broken images are found'
    required: false
    default: 'true'

outputs:
  report-path:
    description: 'Path to the generated report'
    value: ${{ inputs.report-path }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --omit=dev || npm install --omit=dev

    - name: Install Playwright Chromium
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npx playwright install chromium

    - name: Run crawler
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        SITEMAP_URL: ${{ inputs.sitemap-url }}
        CONCURRENCY: ${{ inputs.concurrency }}
        PAGE_TIMEOUT_MS: ${{ inputs.page-timeout-ms }}
        REPORT_PATH: ${{ github.workspace }}/${{ inputs.report-path }}
        FAIL_ON_ISSUES: ${{ inputs.fail-on-issues }}
      run: node checkImages.js
